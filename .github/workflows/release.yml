name: Release native binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: ascii-apex
            asset: ascii-apex-linux-x64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ascii-apex.exe
            asset: ascii-apex-windows-x64.exe
          - runner: macos-latest
            target: x86_64-apple-darwin
            binary: ascii-apex
            asset: ascii-apex-darwin-x64
          - runner: macos-latest
            target: aarch64-apple-darwin
            binary: ascii-apex
            asset: ascii-apex-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Verify Linux binary is statically linked
        if: runner.os == 'Linux'
        shell: bash
        run: |
          binary="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          if readelf -d "${binary}" | grep -q '(NEEDED)'; then
            echo "::error::Linux release binary has dynamic library dependencies"
            readelf -d "${binary}"
            exit 1
          fi
      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum ascii-apex-* > SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --generate-notes --title "ASCII Apex ${GITHUB_REF_NAME}"
